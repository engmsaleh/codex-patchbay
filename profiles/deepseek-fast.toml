# Recommended alias; override with PATCHBAY_DEEPSEEK_FAST_MODEL. Model IDs are config,
# not source constants (PRD P-08). Mirrors src/profiles.ts (the runtime source of truth).
id = "deepseek-fast"
runtime = "opencode"
model_env = "PATCHBAY_DEEPSEEK_FAST_MODEL"
default_model = "opencode-go/deepseek-v4-flash"
mode = "write"

[limits]
max_steps = 12
max_wall_seconds = 1200
max_output_bytes = 1048576
max_changed_files = 8
max_diff_lines = 400
max_repair_rounds = 1

[permissions]
network = false
recursive_delegation = false
git_commit = false
git_push = false
external_directories = false

# Auth via the OpenCode Go subscription (credential in OpenCode's own auth store). Only
# this provider's entry is copied into the worker's isolated home (PRD 16.9).
[auth]
mode = "opencode_subscription"
provider = "opencode-go"

[cost]
mode = "provider_reported"
